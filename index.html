<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度AI看图识万物 | 刘聿康</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-card {
            max-width: 1300px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .hero-section {
            background: linear-gradient(135deg, #0b2b44, #123e5e);
            padding: 1.5rem 2rem;
            color: white;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .identity {
            background: rgba(255,255,255,0.15);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
        }

        .identity span {
            margin-right: 1rem;
            font-weight: 500;
        }

        .main-panel {
            display: flex;
            flex-wrap: wrap;
            padding: 2rem;
            gap: 2rem;
        }

        .upload-area, .result-area {
            flex: 1;
            background: #f9fafc;
            border-radius: 1.5rem;
            padding: 1.5rem;
        }

        .dropzone {
            border: 2px dashed #ccc;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dropzone:hover {
            border-color: #2c7da0;
            background: #f0f6fe;
        }

        .preview-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 1rem;
            margin-top: 1rem;
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(95deg, #1e6f5c, #289672);
            color: white;
            border: none;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .result-item {
            background: white;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            border-radius: 0.8rem;
            border-left: 4px solid #2c7da0;
        }

        .keyword {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .score {
            color: #2d6a4f;
            margin-left: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #2c7da0;
        }
    </style>
</head>
<body>
<div class="app-card">
    <div class="hero-section">
        <div class="identity">
            <span>📘 学号：42324028</span>
            <span>👤 姓名：刘聿康</span>
        </div>
        <div>🤖 百度AI · 看图识万物</div>
    </div>

    <div class="main-panel">
        <div class="upload-area">
            <h3>📷 上传图片</h3>
            <div id="dropzone" class="dropzone">
                <div>📸 点击或拖拽图片到这里</div>
                <input type="file" id="fileInput" accept="image/*" style="display:none">
            </div>
            <div id="preview"></div>
            <button id="recognizeBtn" class="btn" disabled>🔍 开始识别</button>
            <p style="font-size:0.7rem; margin-top:1rem; text-align:center">演示模式：展示识别效果</p>
        </div>

        <div class="result-area">
            <h3>🧠 识别结果</h3>
            <div id="resultList">等待上传图片...</div>
        </div>
    </div>
</div>

<script>
    let currentImage = null;
    
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const previewDiv = document.getElementById('preview');
    const recognizeBtn = document.getElementById('recognizeBtn');
    const resultList = document.getElementById('resultList');
    
    // 模拟识别结果（演示用）
    const mockResults = [
        { keyword: "猫", score: 0.9542, root: "哺乳动物" },
        { keyword: "宠物", score: 0.8765, root: "家养动物" },
        { keyword: "动物", score: 0.7321, root: "生物" },
        { keyword: "可爱", score: 0.6543, root: "特征" }
    ];
    
    function showResults() {
        resultList.innerHTML = '<div class="loading">🤖 AI 正在分析图片...</div>';
        
        setTimeout(() => {
            let html = '';
            mockResults.forEach(item => {
                html += `
                    <div class="result-item">
                        <span class="keyword">📌 ${item.keyword}</span>
                        <span class="score">${(item.score * 100).toFixed(2)}%</span>
                        <div style="font-size:0.75rem; color:#666">🔎 ${item.root}</div>
                    </div>
                `;
            });
            resultList.innerHTML = html;
        }, 1500);
    }
    
    function handleImage(file) {
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            previewDiv.innerHTML = `<img src="${e.target.result}" class="preview-image" alt="预览">`;
            currentImage = e.target.result;
            recognizeBtn.disabled = false;
            resultList.innerHTML = '图片已就绪，点击识别按钮查看AI分析结果';
        };
        reader.readAsDataURL(file);
    }
    
    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => e.preventDefault());
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleImage(file);
    });
    fileInput.addEventListener('change', (e) => {
        if (fileInput.files[0]) handleImage(fileInput.files[0]);
    });
    recognizeBtn.addEventListener('click', showResults);
</script>
</body>
</html>
